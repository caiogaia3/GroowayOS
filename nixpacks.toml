# Do NOT add python as a provider — it brings gcc which conflicts with Node's ICU libs
# Instead, install python3 + pip via apt packages alongside the auto-detected Node provider

[phases.setup]
aptPkgs = ['...', 'python3', 'python3-pip', 'python3-venv']

[phases.install]
cmds = [
    '...',
    'python3 -m pip install -r intelligence/requirements.txt --break-system-packages'
]

[start]
cmd = 'npm start'
