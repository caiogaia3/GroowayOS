[variables]
VIRTUAL_ENV = "/app/.venv"
PATH = "/app/.venv/bin:$PATH"

[phases.setup]
aptPkgs = ["...", "python3", "python3-pip", "python3-venv"]

[phases.install]
# Cache both node_modules and the python virtual environment
cacheDirectories = ["node_modules", ".venv"]
cmds = [
    "npm ci",
    "[ -d /app/.venv ] || python3 -m venv /app/.venv",
    "/app/.venv/bin/pip install -r intelligence/requirements.txt"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"
