[providers]
node = "20"
python = "3.11"

[phases.setup]
nixPkgs = ["...", "python311Packages.pip"]

[phases.install]
cmds = [
    "npm ci",
    "python3 -m venv /app/venv",
    "/app/venv/bin/pip install -r /app/intelligence/requirements.txt"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"
